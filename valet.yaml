iname: agentmail-slack
display_name: Agentmail-Slack
description: >-
  Lives in Slack and turns conversation content into outbound emails
  sent via AgentMail. Always drafts in-thread and waits for explicit
  user approval before sending.
category: productivity
connectors:
  - catalog: agentmail
    description: >-
      Gives the agent its own AgentMail inbox to draft and send emails
      on the user's behalf.
    slot_descriptions:
      AGENTMAIL_API_KEY: AgentMail API key (from https://agentmail.to)
channels:
  - catalog: slack
    description: >-
      The Slack workspace the agent listens in. Users chat with the
      agent here to request, review, and approve outbound emails.
