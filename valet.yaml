name: linear-slack
display_name: Linear-Slack
description: >-
  Lives in Slack and turns conversation content into Linear issues.
  Always drafts in-thread and waits for explicit user approval before
  creating the issue.
category: productivity
connectors:
  - catalog: linear-mcp-oauth
    description: >-
      Connects the agent to Linear so it can list teams, draft issues,
      and create them after user approval. Uses OAuth — no API token
      required.
channels:
  - catalog: slack
    description: >-
      The Slack workspace the agent listens in. Users chat with the
      agent here to request, review, and approve Linear issues.
