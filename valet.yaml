name: linear-slack
display_name: Linear Slack Drafter
description: >-
  Lives in Slack and turns conversation content into Linear issues.
  Always drafts in-thread and waits for explicit user approval before
  creating the issue.
category: productivity
author: Valet

story:
  hero: "Turn Slack messages into Linear issues — only after you approve."
  subheadline: "Paste a message, review the draft in-thread, reply 'create' when it looks right — nothing lands in Linear without your sign-off."
  steps:
    - role: trigger
      title: "You paste a message in Slack."
      body: "Drop a bug report, feature request, or note — anywhere the agent has been invited. Threads are fine too."
      catalog: slack
    - role: action
      title: "Drafter writes the issue in-thread."
      body: "Picks the team, writes a clean title and description, posts the full draft back for review."
      catalog: linear-mcp-oauth
    - role: outcome
      title: "You say 'create' — it files it."
      body: "Files the approved issue in Linear and posts the link back in-thread. Nothing lands without your sign-off."
      catalog: linear-mcp-oauth

connectors:
  - catalog: linear-mcp
    description: >-
      Connects the agent to Linear so it can list teams, draft issues,
      and create them after user approval. Uses OAuth — no API token
      required.
    ui:
      headline: "Connect the Linear workspace you write into."
      blurb: "One click authorizes the drafter to list teams and file approved issues. Nothing is created until you say 'create'."
      done_note: "Connected to your Linear workspace"

channels:
  - catalog: slack
    description: >-
      The Slack workspace the agent listens in. Users chat with the
      agent here to request, review, and approve Linear issues.
    ui:
      headline: "Let the drafter listen in your Slack."
      blurb: "Pick the channel — or DM it. Paste a message, review the draft in-thread, reply 'create' when it's right."
      done_note: "Listening in the channel you invite it to"
